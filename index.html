<!DOCTYPE html>
<html lang="pt-BR"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bin2Dec</title>  
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Binary to Decimal</h1>

        <p>Digite um número binário para converter em decimal.</p>

        <input 
        type="text" 
        id="binaryInput"
         placeholder="Ex: 1010"
        />

        <button id="convertButton"> 
            Converter
        </button>

        <div class="result"> 
             <h2>Resultado</h2> 

        <p id="result">0</p>
     </div>

    </div>
    
    <script src="script.js"></script>
</body>
</html>
